spring:
  application:
    name: realtime-chat

  data:
    mongodb:
      uri: mongodb://localhost:27017/chatapp
      database: chatapp

    redis:
      host: localhost
      port: 6379
      password:
      timeout: 60000ms

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: NON_NULL

server:
  port: 8080

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970   # change in production
    expiration: 86400000      # 24 hours in ms
    refresh-expiration: 604800000  # 7 days in ms

  websocket:
    allowed-origins: "http://localhost:3000,http://localhost:4200"

logging:
  level:
    com.chatapp: DEBUG
    org.springframework.web.socket: DEBUG